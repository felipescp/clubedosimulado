<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube do Simulado</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:system-ui,sans-serif;font-size:15px;background:#f5f5f0;color:#1a1a1a;display:flex;flex-direction:column}
  body.dark{background:#111318;color:#e8eaf0}
  .tela{display:none;flex-direction:column}
  .tela.ativa{display:flex;flex:1;min-height:0}
  #barra1{background:#fff;border-bottom:0.5px solid #e0e0e0;padding:.4rem .75rem;display:flex;align-items:center;gap:.4rem;flex-shrink:0;flex-wrap:wrap}
  .b1{font-size:12px;padding:.3rem .75rem;border-radius:6px;border:0.5px solid #ddd;background:#fff;cursor:pointer;color:#555;white-space:nowrap}
  .b1:hover{border-color:#4a6cf7;color:#4a6cf7}
  .b1.p{background:#4a6cf7;color:#fff;border-color:#4a6cf7;font-weight:500}
  .b1.p:hover{background:#3355e0}
  .b1.w{color:#ef4444;border-color:#fca5a5}
  .b1.w:hover{background:#fef2f2}
  .b1:disabled{opacity:.4;cursor:default;pointer-events:none}
  .b1sep{width:1px;height:20px;background:#e0e0e0;flex-shrink:0}
  body.dark #barra1{background:#16181f;border-color:#2e3140}
  body.dark .b1{background:#1e2128;border-color:#2e3140;color:#a0a8c0}
  body.dark .b1.p{background:#4a6cf7;color:#fff}
  #barra2{background:#fff;border-bottom:0.5px solid #e0e0e0;display:flex;align-items:stretch;flex-shrink:0;min-height:38px;overflow-x:auto}
  #barra2::-webkit-scrollbar{height:3px}
  #barra2::-webkit-scrollbar-thumb{background:#ddd;border-radius:99px}
  .tab-wrap{display:inline-flex;align-items:center;padding:0 .25rem 0 .75rem;border-bottom:2px solid transparent;flex-shrink:0;gap:2px}
  .tab-wrap.ativa{border-bottom-color:#4a6cf7}
  .tab-nome{background:none;border:none;font:inherit;font-size:13px;color:#888;cursor:pointer;padding:.5rem .25rem;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;outline:none;border-radius:4px;}
  .tab-wrap.ativa .tab-nome{color:#4a6cf7;font-weight:500;cursor:text;}
  .tab-pct{font-size:11px;border-radius:99px;padding:1px 6px;font-weight:500;background:#eef1ff;color:#4a6cf7;white-space:nowrap;}
  .tab-x{padding:.2rem .35rem;cursor:pointer;color:#bbb;font-size:16px;line-height:1;border:none;background:none;border-radius:4px;}
  .tab-x:hover{color:#ef4444;background:#fee2e2;}
  body.dark #barra2{background:#16181f;border-color:#2e3140}
  body.dark .tab-wrap.ativa .tab-nome{color:#7a9cf7}
  #tela-config{align-items:center;justify-content:center;padding:4rem 2rem 2rem;gap:1.5rem;overflow-y:auto}
  .cfg-card, .sess-card{background:#fff;border-radius:12px;border:0.5px solid #ddd;padding:1.5rem;width:100%;max-width:500px;display:flex;flex-direction:column;gap:1rem}
  body.dark .cfg-card, body.dark .sess-card{background:#1e2128;border-color:#2e3140}
  .bp{background:#4a6cf7;color:#fff;border:none;border-radius:8px;padding:.7rem;font-size:15px;cursor:pointer;width:100%}
  #tela-simulado{flex-direction:row!important;min-height:0;flex:1}
  #sim-wrap{display:flex;flex:1;min-height:0;overflow:hidden}
  #mc{flex:1;padding:2rem 2rem 4rem;overflow-y:scroll;min-width:0}
  #sb{width:280px;max-width:36vw;min-width:200px;flex-shrink:0;padding:1.25rem;overflow-y:scroll;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-left:0.5px solid #e0e0e0;transition:transform .25s ease}
  body.dark #sb{background:rgba(20,22,30,.92);border-color:#2e3140}
  .q{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:1.5rem;margin-bottom:1rem}
  body.dark .q{background:#1e2128;border-color:#2e3140}
  .nb{width:36px;height:36px;border-radius:6px;border:0.5px solid #ddd;background:#fff;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888}
  
  /* Botões flutuantes e Mobile */
  #sb-toggle, #top-toggle { display: none; }
  @media(max-width:700px){
    #barra1, #barra2 { display: none !important; }
    body.top-aberto #barra1, body.top-aberto #barra2 { display: flex !important; }
    #sb { position: fixed; top: 0; right: 0; bottom: 0; width: 85vw; z-index: 250; transform: translateX(100%); box-shadow: -4px 0 24px rgba(0,0,0,.15); }
    #sb.open { transform: translateX(0); }
    #sb-toggle, #top-toggle { display: flex !important; position: fixed; bottom: 1.25rem; z-index: 9999; width: 52px; height: 52px; border-radius: 50%; color: #fff; border: none; font-size: 22px; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    #sb-toggle { right: 1.25rem; background: #4a6cf7; }
    #top-toggle { left: 1.25rem; background: #f59e0b; }
    #mc { padding: 1rem 1rem 5rem; }
    #sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 240; }
    #sb-overlay.open { display: block; }
  }

  /* Auditoria e Modal Exportação */
  .mod-exp-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 40vh; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 0.5rem; }
  .mod-exp-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem; border-radius: 6px; cursor: pointer; background: #fafafa; border: 1px solid #f0f0f0; }
  body.dark .mod-exp-item { background: #1a1d26; border-color: #252830; }

  /* Correções de Contraste Modo Escuro */
  body.dark .qn, body.dark .bg h3 { color: #8a8fa8 !important; }
  body.dark .nb { background: #2a2d3a !important; border-color: #3a3d50 !important; color: #a0a8c0 !important; }
  body.dark .nb.nr { color: #707590 !important; }
  body.dark .qe { color: #e8eaf0 !important; }
</style>
</head>
<body>

<div id="barra1">
  <button class="b1" id="b1-limpar" disabled>Limpar simulado</button>
  <div class="b1sep"></div>
  <button class="b1 p" id="b1-novo">+ Novo simulado</button>
  <button class="b1" id="b1-biblioteca" onclick="abrirBiblioteca()" style="color:#059669; border-color:#a7f3d0; background:#ecfdf5; font-weight:500;">📚 Biblioteca</button>
  <button class="b1" id="b1-export-novo" onclick="abrirModalExportacao()">Exportar JSON</button>
  <label class="b1" style="cursor:pointer">Importar JSON<input type="file" accept=".json" id="b1-import" style="display:none"></label>
  <button class="b1" id="b1-reset">↺ Nova sessão</button>
  <button class="b1 w" id="b1-tema">☀</button>
</div>
<div id="barra2"></div>

<div id="tela-config" class="tela ativa">
  <h1>Novo Simulado</h1>
  <div class="cfg-card">
    <input type="text" id="cfg-nome" placeholder="Nome do simulado...">
    <div class="rg">
      <div class="ro sel" id="ro-ce">Certo / Errado</div>
      <div class="ro" id="ro-mc">Múltipla Escolha</div>
    </div>
    <button class="bp" id="cfg-ok" disabled>Continuar</button>
  </div>
  <div class="sess-card">
    <h2>Sessões salvas</h2>
    <div id="cfg-sess-lista"></div>
  </div>
</div>

<div id="tela-upload" class="tela">
  <textarea id="paste-area" placeholder="Cole as questões aqui..."></textarea>
  <div class="rbts">
    <button class="bs" id="up-voltar">← Voltar</button>
    <button class="bp" id="up-iniciar">Iniciar Simulado</button>
  </div>
</div>

<div id="tela-proc" class="tela">Processando...</div>

<div id="tela-simulado" class="tela">
  <div id="sim-wrap">
    <div id="sb-overlay" onclick="toggleSb()"></div>
    <div id="mc"></div>
    <div id="sb">
      <button class="b1 p" id="b1-finalizar" style="width:100%;margin-bottom:.5rem;background:#22c55e;">✓ Finalizar Simulado</button>
      <button class="b1" id="b1-exp-res" style="width:100%;margin-bottom:1rem;">⬇ Exportar resultado</button>
      <h2>Sessões salvas</h2>
      <input type="text" class="sess-input" id="sess-nome" placeholder="Nome da sessão...">
      <button class="b1 p" id="b1-salvar-sess" style="width:100%;margin-bottom:1rem;">＋ Salvar sessão</button>
      <div id="sess-lista"></div>
      <h2 style="margin-top:1rem">Questões</h2>
      <div id="sbnav"></div>
    </div>
    <button id="sb-toggle" onclick="toggleSb()">☰</button>
  </div>
</div>

<div id="tela-resultado" class="tela">
  <div class="ri" id="ri"></div>
</div>

<button id="top-toggle" onclick="toggleTop()">⚙</button>

<script>
// --- VARIÁVEIS GLOBAIS ---
var SIMS=[], SI=-1, HIST=[], HI=-1;
var C={nome:'',tipo:'ce',cegas:false};
var D={blocos:[],res:{},fin:{},caderno:[]};
var QA=null, DARK=false, MODO_REVISAO=false;

// --- FUNÇÕES AUXILIARES ---
function g(id){return document.getElementById(id);}
function tela(id){document.querySelectorAll('.tela').forEach(t=>{t.classList.remove('ativa');t.style.display='none'});if(id){g(id).classList.add('ativa');g(id).style.display='flex'}}

// --- CONTROLES MOBILE ---
function toggleSb(){
  var sb=g('sb'), ov=g('sb-overlay'), btn=g('sb-toggle');
  var open=sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open', open);
  btn.textContent = open ? '×' : '☰';
}
function toggleTop(){
  var aberto = document.body.classList.toggle('top-aberto');
  g('top-toggle').textContent = aberto ? '×' : '⚙';
}
function fecharSb(){
  g('sb').classList.remove('open');
  if(g('sb-overlay')) g('sb-overlay').classList.remove('open');
  document.body.classList.remove('top-aberto');
}

// --- BIBLIOTECA AUTOMATIZADA ---
function abrirBiblioteca() {
  var dark = document.body.classList.contains('dark');
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem';
  var box = document.createElement('div');
  box.style.cssText = 'background:'+(dark?'#1e2128':'#fff')+';border-radius:14px;padding:1.5rem;width:100%;max-width:450px;display:flex;flex-direction:column;gap:1rem;box-shadow:0 8px 32px rgba(0,0,0,.2)';
  box.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><strong style="color:${dark?'#fff':'#000'}">📚 Biblioteca</strong><button onclick="this.parentElement.parentElement.parentElement.remove()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#888">×</button></div><div id="lib-list" style="max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:0.5rem">Carregando...</div>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  fetch('simulados/catalogo.json?t=' + Date.now())
    .then(res => res.json())
    .then(catalogo => {
      var list = g('lib-list'); list.innerHTML = '';
      catalogo.forEach(item => {
        var row = document.createElement('div');
        row.className = 'mod-exp-item';
        var tit = item.arquivo.split('/').pop().replace('.json','').replace(/-/g,' ');
        row.innerHTML = `<span style="flex:1;font-size:14px">${tit.toUpperCase()}</span><button class="b1 p">Abrir</button>`;
        row.onclick = () => carregarDoServidor(item.arquivo, overlay);
        list.appendChild(row);
      });
    }).catch(() => g('lib-list').innerHTML = "Erro ao carregar catálogo.");
}

function carregarDoServidor(url, modal) {
  fetch(url + '?t=' + Date.now()).then(r => r.json()).then(data => {
    var arr = data.sims || data.simulados || data;
    SIMS = SIMS.concat(arr); SI = SIMS.length - arr.length;
    D = JSON.parse(JSON.stringify(SIMS[SI].dados)); C = SIMS[SI].cfg;
    renderTabs(); tela('tela-simulado'); renderSim(); renderNav();
    modal.remove();
  });
}

// --- LOGICA DE EXPORTAÇÃO ---
function abrirModalExportacao() {
  if(!SIMS.length) return;
  var dark = document.body.classList.contains('dark');
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem';
  var box = document.createElement('div');
  box.style.cssText = 'background:'+(dark?'#1e2128':'#fff')+';border-radius:14px;padding:1.5rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:1rem';
  box.innerHTML = `<strong>Exportar Simulados</strong><div class="mod-exp-list">` + 
    SIMS.map((s,i) => `<label class="mod-exp-item"><input type="checkbox" checked value="${i}"> ${s.cfg.nome}</label>`).join('') +
    `</div><button class="bp" id="btn-do-exp">Baixar Selecionados</button>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  
  g('btn-do-exp').onclick = () => {
    var sel = Array.from(box.querySelectorAll('input:checked')).map(i => SIMS[i.value]);
    var blob = new Blob([JSON.stringify({sims:sel})], {type:'application/json'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='simulados.json'; a.click();
    overlay.remove();
  };
}

// --- RESTO DO SCRIPT (RESUMIDO PARA FUNCIONAR) ---
window.addEventListener('load', function(){
  g('b1-novo').onclick = () => tela('tela-config');
  g('cfg-nome').oninput = () => g('cfg-ok').disabled = !g('cfg-nome').value;
  g('cfg-ok').onclick = () => tela('tela-upload');
  g('b1-tema').onclick = () => { DARK=!DARK; document.body.classList.toggle('dark', DARK); };
  g('up-iniciar').onclick = () => { 
    // Simulação simplificada de parser para exemplo funcional
    var b = {nome: g('cfg-nome').value, questoes: [{id:1, enunciado: "Questão teste", gabarito: "V"}]};
    D.blocos = [b]; SIMS.push({cfg: JSON.parse(JSON.stringify(C)), dados: JSON.parse(JSON.stringify(D))});
    SI = SIMS.length-1; renderTabs(); tela('tela-simulado'); renderSim(); renderNav();
  };
});

function renderTabs(){
  g('barra2').innerHTML = SIMS.map((s,i) => `<div class="tab-wrap ${i==SI?'ativa':''}" onclick="SI=${i};D=JSON.parse(JSON.stringify(SIMS[SI].dados));renderSim();renderNav();renderTabs()"><span class="tab-nome">${s.cfg.nome}</span></div>`).join('');
}
function renderSim(){
  g('mc').innerHTML = D.blocos.map(b => `<div class="bloco"><h3>${b.nome}</h3>` + b.questoes.map(q => `<div class="q">${q.enunciado}</div>`).join('') + `</div>`).join('');
}
function renderNav(){
  g('sbnav').innerHTML = D.blocos.map(b => b.questoes.map(q => `<button class="nb nr">${q.id}</button>`).join('')).join('');
}
</script>
</body>
</html>
